<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>座席表メーカーPro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @media print {
            @page { size: A4 landscape; margin: 0; }
            body { -webkit-print-color-adjust: exact; margin: 0; padding: 0; width: 100%; height: 100%; }
            .no-print { display: none !important; }
        }
        .dragging { opacity: 0.5; border: 2px dashed #000; }
        .drag-over { background-color: #e0f2fe; border: 2px solid #3b82f6; }
        .touch-dragging { background-color: #fef3c7; border: 2px solid #f59e0b; transform: scale(1.05); z-index: 10; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .user-select-none {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 user-select-none">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 安全な汎用アイコンコンポーネント ---
        const LucideIcon = ({ name, size = 24, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && window.lucide.icons && window.lucide.icons[name]) {
                    const svg = window.lucide.icons[name].toSvg({ width: size, height: size, class: className });
                    if (ref.current) ref.current.innerHTML = svg;
                } else {
                    // Lucideが未ロード、またはアイコン名が存在しない場合のフォールバック
                    if (ref.current) ref.current.innerHTML = `<span class="${className}" style="width:${size}px; height:${size}px; display:inline-block; border:1px solid #ccc; border-radius:50%"></span>`;
                }
            }, [name, size, className]);
            return <span ref={ref} className="inline-flex items-center justify-center" />;
        };

        const DEFAULT_ROWS = 6;
        const DEFAULT_COLS = 6;

        const STYLES = {
            boy: { border: 'border-blue-500', text: 'text-blue-600', bg: 'bg-white' },
            girl: { border: 'border-red-500', text: 'text-red-600', bg: 'bg-white' },
            void: { border: 'border-gray-200', text: 'text-gray-300', bg: 'bg-gray-100' },
            default: { border: 'border-gray-300', text: 'text-gray-800', bg: 'bg-gray-50' }
        };

        const rosterToCsvText = (list) => {
            if (!list || list.length === 0) return '';
            return list.map(s => {
                const genderJP = s.gender === 'F' ? '女' : '男';
                return `${s.number || ''},${s.name || ''},${s.furigana || ''},${genderJP}`;
            }).join('\n');
        };

        const parseCSV = (text) => {
            const lines = text.trim().split(/\r?\n/);
            return lines.map(line => {
                const parts = line.split(/,|\t/);
                if (parts.length < 2) return null;
                const num = parts[0]?.trim();
                const name = parts[1]?.trim();
                let furigana = '';
                let genderStr = '';
                if (parts.length >= 4) {
                    furigana = parts[2]?.trim() || '';
                    genderStr = parts[3]?.trim() || '';
                } else {
                    genderStr = parts[2]?.trim() || '';
                }
                let gender = 'M';
                if (['女', 'F', 'f', 'woman', 'girl'].some(g => genderStr.includes(g))) {
                    gender = 'F';
                }
                return {
                    id: Math.random().toString(36).substr(2, 9),
                    number: num,
                    name: name,
                    furigana: furigana,
                    gender: gender,
                    vision: false,
                    leader: false,
                    notes: '',
                    allowedCells: []
                };
            }).filter(Boolean);
        };

        const normalizeText = (text) => {
            if (!text) return '';
            return text.replace(/[０-９]/g, (s) => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
        };

        const extractTargetNumber = (text) => {
            const normalized = normalizeText(text);
            const match = normalized.match(/(\d+)番/);
            return match ? match[1] : null;
        };

        const analyzeLocationReq = (note) => {
            if (!note) return null;
            const n = normalizeText(note); 
            const req = { rowExact: null, colExact: null, rowZone: null, colZone: null };
            if (n.includes('一番前') || n.includes('最前列')) req.rowExact = 0;
            else if (n.includes('前')) req.rowZone = 'front';
            if (n.includes('一番後') || n.includes('最後尾')) req.rowExact = 'last';
            else if (n.includes('後')) req.rowZone = 'back';
            if (n.includes('一番右') || n.includes('右端')) req.colExact = 'last';
            else if (n.includes('右')) req.colZone = 'right';
            if (n.includes('一番左') || n.includes('左端')) req.colExact = 0;
            else if (n.includes('左')) req.colZone = 'left';
            const matchRowFromFront = n.match(/前から(\d+)[列行]目/);
            if (matchRowFromFront) req.rowExact = parseInt(matchRowFromFront[1], 10) - 1;
            const matchRowOnly = n.match(/(\d+)行目/);
            if (matchRowOnly && !matchRowFromFront) req.rowExact = parseInt(matchRowOnly[1], 10) - 1;
            const matchColLeft = n.match(/左から(\d+)列目/);
            if (matchColLeft) req.colExact = parseInt(matchColLeft[1], 10) - 1;
            const matchColRight = n.match(/右から(\d+)列目/);
            if (matchColRight) req.colExact = { fromRight: parseInt(matchColRight[1], 10) - 1 };
            if (!matchColLeft && !matchColRight && !matchRowFromFront) {
                const matchColOnly = n.match(/(?<![前後左右]から)(\d+)列目/);
                if (matchColOnly) req.colExact = parseInt(matchColOnly[1], 10) - 1;
            }
            if (req.rowExact === null && req.colExact === null && req.rowZone === null && req.colZone === null) return null;
            return req;
        };

        const PaintModalContent = ({ student, config, fixedVoids, onSave, onCancel }) => {
            const [selected, setSelected] = useState(new Set(student.allowedCells || []));
            const [isPainting, setIsPainting] = useState(false);
            const [paintMode, setPaintMode] = useState(true);
            useEffect(() => {
                const handleUp = () => setIsPainting(false);
                window.addEventListener('mouseup', handleUp);
                window.addEventListener('touchend', handleUp);
                return () => {
                    window.removeEventListener('mouseup', handleUp);
                    window.removeEventListener('touchend', handleUp);
                };
            }, []);
            const handleDown = (idx) => {
                if (fixedVoids.has(idx)) return;
                setIsPainting(true);
                const mode = !selected.has(idx);
                setPaintMode(mode);
                updateCell(idx, mode);
            };
            const handleEnter = (idx) => {
                if (isPainting && !fixedVoids.has(idx)) updateCell(idx, paintMode);
            };
            const handleTouchMove = (e) => {
                if (!isPainting) return;
                const touch = e.touches[0];
                const el = document.elementFromPoint(touch.clientX, touch.clientY);
                if (el && el.dataset.idx) {
                    const idx = parseInt(el.dataset.idx, 10);
                    if (!fixedVoids.has(idx)) updateCell(idx, paintMode);
                }
            };
            const updateCell = (idx, mode) => {
                setSelected(prev => {
                    const next = new Set(prev);
                    if (mode) next.add(idx); else next.delete(idx);
                    return next;
                });
            };
            return (
                <div className="space-y-4">
                    <div className="bg-blue-50 p-3 rounded text-sm text-gray-700">
                        <span className="font-bold text-blue-800">{student.name}</span> さんが配置される可能性のある座席をすべて塗りつぶしてください。<br/>
                        <span className="text-red-600 font-bold">※指定範囲が狭すぎると、他の条件と衝突して席替えに失敗する原因になります。</span>
                    </div>
                    <div className="flex justify-end gap-2 mb-2">
                        <button onClick={() => setSelected(new Set())} className="text-xs bg-gray-200 px-3 py-1.5 rounded font-bold hover:bg-gray-300">クリア</button>
                        <button onClick={() => {
                            const all = new Set();
                            for(let i=0; i<config.rows*config.cols; i++) if(!fixedVoids.has(i)) all.add(i);
                            setSelected(all);
                        }} className="text-xs bg-gray-200 px-3 py-1.5 rounded font-bold hover:bg-gray-300">全選択</button>
                    </div>
                    {config.perspective === 'STUDENT' && (
                        <div className="w-full flex justify-center mt-2 mb-2">
                            <div className="border-2 border-black bg-gray-100 px-8 py-1 rounded font-bold text-xs">教 卓</div>
                        </div>
                    )}
                    <div className="grid gap-1 mx-auto touch-none" style={{ gridTemplateColumns: `repeat(${config.cols}, minmax(0, 1fr))` }} onTouchMove={handleTouchMove}>
                        {Array(config.rows * config.cols).fill(null).map((_, index) => {
                            let realIndex = index;
                            if (config.perspective === 'TEACHER') {
                                const r = Math.floor(index / config.cols);
                                const c = index % config.cols;
                                const realR = config.rows - 1 - r;
                                const realC = config.cols - 1 - c;
                                realIndex = realR * config.cols + realC;
                            }
                            const isVoid = fixedVoids.has(realIndex);
                            const isSelected = selected.has(realIndex);
                            return (
                                <div key={realIndex} data-idx={realIndex} onMouseDown={() => handleDown(realIndex)} onMouseEnter={() => handleEnter(realIndex)} onTouchStart={(e) => { e.preventDefault(); handleDown(realIndex); }} className={`h-12 flex items-center justify-center border rounded cursor-pointer select-none transition-colors ${isVoid ? 'bg-gray-200 border-gray-300 text-transparent' : isSelected ? 'bg-green-500 border-green-600 text-white font-bold' : 'bg-white border-gray-300 hover:bg-gray-100'}`}>
                                    {isSelected ? '〇' : ''}
                                </div>
                            );
                        })}
                    </div>
                    {config.perspective === 'TEACHER' && (
                        <div className="w-full flex justify-center mt-2 mb-4">
                            <div className="border-2 border-black bg-gray-100 px-8 py-1 rounded font-bold text-xs">教 卓</div>
                        </div>
                    )}
                    <div className="flex justify-end gap-3 mt-6">
                        <button onClick={onCancel} className="px-4 py-2 border rounded hover:bg-gray-100 font-bold">キャンセル</button>
                        <button onClick={() => onSave(Array.from(selected))} className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-bold">保存 ({selected.size}席指定)</button>
                    </div>
                </div>
            );
        };

        const Modal = ({ modal, closeModal, modalInput, setModalInput, submitModalAuth, authError, roster = [], config, fixedVoids }) => {
            if (!modal.isOpen) return null;
            let content;
            if (modal.type === 'HELP') {
                content = (
                    <div className="space-y-4 text-sm text-gray-700">
                        <section>
                            <h4 className="font-bold text-base text-gray-800 mb-2">【ルールの設定方法】</h4>
                            <div className="space-y-2 pl-2">
                                <div><span className="font-bold text-blue-700">● 配置エリアの指定（推奨）</span><br/>
                                リストの<span className="bg-gray-100 px-1 border rounded text-[10px]">全域</span>ボタンを押して、座席をなぞる（ドラッグ・スワイプ）ことで配置エリアを限定できます。前方指定や壁際指定などが自由に行えます。</div>
                                
                                <div><span className="font-bold text-blue-700">● 席を離す</span><br/>配慮事項に「◯番と離す」と記入します。</div>
                                
                                <div><span className="font-bold text-blue-700">● ペアにする</span><br/>配慮事項に「◯番とペア」と記入します。</div>
                                
                                <div><span className="font-bold text-blue-700">● 視力・リーダー設定</span><br/>チェックボックスをオンにすると、視力は前方、リーダーはクラス全体に均等に分散配置されます。</div>
                            </div>
                        </section>
                        <section>
                            <h4 className="font-bold text-base text-gray-800 mb-2">【注意点】</h4>
                            <ul className="list-disc pl-5">
                                <li>「離す」対象とは、間に最低2マス以上の間隔を空けて配置します。</li>
                                <li>条件が厳しすぎると（例：狭いエリア指定の重複など）、席替えに失敗することがあります。</li>
                            </ul>
                        </section>
                        <button onClick={closeModal} className="mt-6 w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700 transition">閉じる</button>
                    </div>
                );
            } else if (modal.type === 'PRINT_HELP') {
                content = (
                    <div className="space-y-4 text-sm text-gray-700">
                        <p>「印刷・出力」ボタンを押すと、新しいタブで座席表が開き、自動的に印刷画面が表示されます。</p>
                        <div className="bg-blue-50 p-3 rounded text-xs">
                            ※A4横向きサイズ（余白なし・背景のグラフィックスを含める設定）での印刷を推奨します。<br/>
                            ※ポップアップブロック機能が有効な場合、新しいタブが開かないことがあります。その場合はブロックを解除してください。
                        </div>
                        <button onClick={closeModal} className="mt-6 w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700 transition">閉じる</button>
                    </div>
                );
            } else if (modal.type === 'PAINT') {
                const student = roster.find(s => s.id === modal.studentId);
                if (!student) return null;
                content = <PaintModalContent student={student} config={config} fixedVoids={fixedVoids} onSave={(cells) => { modal.onConfirm(cells); closeModal(); }} onCancel={closeModal} />;
            } else if (modal.type === 'LOGIN' || modal.type === 'SETUP_PASS') {
                content = (
                    <div>
                        <p className="text-sm text-gray-600 mb-4">{modal.message}</p>
                        <input type="password" autoFocus value={modalInput} onChange={(e) => setModalInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && submitModalAuth()} className="w-full border p-2 rounded mb-2" placeholder="パスワード"/>
                        {authError && <p className="text-red-500 text-xs mb-3 font-bold">{authError}</p>}
                        <button onClick={submitModalAuth} className="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">{modal.type === 'SETUP_PASS' ? '設定して進む' : '認証'}</button>
                    </div>
                );
            } else {
                content = (
                   <div>
                        <p className="text-gray-700 mb-6 whitespace-pre-wrap">{modal.message}</p>
                        <div className="flex justify-end gap-3">
                            {modal.type === 'CONFIRM' && <button onClick={closeModal} className="px-4 py-2 border rounded hover:bg-gray-100">キャンセル</button>}
                            <button onClick={() => { if (modal.onConfirm) modal.onConfirm(); closeModal(); }} className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-bold">OK</button>
                        </div>
                   </div>
                );
            }
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-lg p-6 max-w-lg w-full shadow-xl max-h-[90vh] overflow-y-auto">
                        <div className="flex justify-between items-center mb-4 border-b pb-2">
                            <h3 className="text-xl font-bold flex items-center gap-2">
                                {modal.type === 'HELP' && <LucideIcon name="help-circle" className="text-blue-600" />}
                                {modal.type === 'PRINT_HELP' && <LucideIcon name="printer" className="text-blue-600" />}
                                {modal.type === 'LOGIN' && <LucideIcon name="lock" size={20} />}
                                {(modal.type === 'CONFIRM' || modal.type === 'ALERT') && <LucideIcon name="alert-triangle" className="text-yellow-500" />}
                                {modal.title}
                            </h3>
                            <button onClick={closeModal} className="text-gray-500 hover:text-gray-700"><LucideIcon name="x" size={20}/></button>
                        </div>
                        {content}
                    </div>
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('HOME');

            useEffect(() => {
                const handleContextMenu = (e) => {
                    if (e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'INPUT') e.preventDefault();
                };
                const handleKeyDown = (e) => {
                    if (e.keyCode === 123) e.preventDefault();
                    if (e.ctrlKey && e.shiftKey && e.keyCode === 73) e.preventDefault();
                    if (e.ctrlKey && e.keyCode === 85) e.preventDefault();
                };
                document.addEventListener('contextmenu', handleContextMenu);
                document.addEventListener('keydown', handleKeyDown);
                return () => {
                    document.removeEventListener('contextmenu', handleContextMenu);
                    document.removeEventListener('keydown', handleKeyDown);
                };
            }, []);

            const loadFromStorage = (key, defaultValue) => {
                try {
                    const saved = localStorage.getItem(key);
                    return saved ? JSON.parse(saved) : defaultValue;
                } catch (e) { return defaultValue; }
            };

            const [roster, setRoster] = useState(() => loadFromStorage('sekigae_roster', []));
            const [config, setConfig] = useState(() => loadFromStorage('sekigae_config', {
                rows: DEFAULT_ROWS,
                cols: DEFAULT_COLS,
                className: 'X年X組',
                password: '',
                perspective: 'STUDENT',
                seatingPattern: 'CHECKERED',
            }));
            const [fixedVoids, setFixedVoids] = useState(() => {
                const saved = loadFromStorage('sekigae_voids', []);
                return new Set(saved);
            });
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [newPassword, setNewPassword] = useState('');
            const [oldPasswordInput, setOldPasswordInput] = useState('');
            const [authError, setAuthError] = useState('');
            const [seats, setSeats] = useState(() => {
                const savedSeats = loadFromStorage('sekigae_seats', null);
                const totalSeats = config.rows * config.cols;
                if (savedSeats && savedSeats.length === totalSeats) return savedSeats;
                return Array(totalSeats).fill(null).map((_, i) => ({ id: `seat-${i}`, student: null }));
            });

            useEffect(() => {
                const totalSeats = config.rows * config.cols;
                setSeats(prev => {
                    if (prev.length === totalSeats) return prev;
                    return Array(totalSeats).fill(null).map((_, i) => ({ id: `seat-${i}`, student: null }));
                });
            }, [config.rows, config.cols]);

            const [isShuffling, setIsShuffling] = useState(false);
            const [shuffleIntervalId, setShuffleIntervalId] = useState(null);
            const [tempMessage, setTempMessage] = useState('');
            const [dragSourceIndex, setDragSourceIndex] = useState(null);
            const [isTouchDragging, setIsTouchDragging] = useState(false);
            const [modal, setModal] = useState({ isOpen: false, type: null, title: '', message: '', onConfirm: null });
            const [modalInput, setModalInput] = useState('');
            const [localCsv, setLocalCsv] = useState(() => {
                const savedCsv = localStorage.getItem('sekigae_csv');
                return savedCsv !== null ? savedCsv : rosterToCsvText(roster);
            });

            useEffect(() => { try { localStorage.setItem('sekigae_seats', JSON.stringify(seats)); } catch(e){} }, [seats]);
            useEffect(() => { try { localStorage.setItem('sekigae_csv', localCsv); } catch(e){} }, [localCsv]);
            useEffect(() => { try { localStorage.setItem('sekigae_roster', JSON.stringify(roster)); } catch(e){} }, [roster]);
            useEffect(() => { try { localStorage.setItem('sekigae_config', JSON.stringify(config)); } catch(e){} }, [config]);
            useEffect(() => { try { localStorage.setItem('sekigae_voids', JSON.stringify([...fixedVoids])); } catch(e){} }, [fixedVoids]);
            useEffect(() => { setLocalCsv(rosterToCsvText(roster)); }, [roster]);

            const openAlert = (title, message) => setModal({ isOpen: true, type: 'ALERT', title, message });
            const openConfirm = (title, message, onConfirm) => setModal({ isOpen: true, type: 'CONFIRM', title, message, onConfirm });
            const closeModal = () => { setModal({ ...modal, isOpen: false }); setModalInput(''); setAuthError(''); };

            const handleCsvApply = (text) => {
                const newStudentsData = parseCSV(text);
                if (roster.length > 0 && newStudentsData.length === 0 && text.trim() === '') {
                    openConfirm('警告', 'エディタの内容が空になりました。全員のデータを削除してよろしいですか？', () => { setRoster([]); });
                    return;
                }
                const mergedRoster = newStudentsData.map(newS => {
                    const existing = roster.find(s => s.number === newS.number);
                    if (existing) return { ...existing, name: newS.name, furigana: newS.furigana, gender: newS.gender };
                    return newS;
                });
                setRoster(mergedRoster);
            };

            const handleAdminAccess = () => {
                setModalInput(''); setAuthError('');
                if (config.password === '') setModal({ isOpen: true, type: 'SETUP_PASS', title: '初回パスワード設定', message: '名簿管理機能を使うにはパスワードの設定が必要です。' });
                else if (isAuthenticated) setView('ADMIN');
                else setModal({ isOpen: true, type: 'LOGIN', title: '管理者認証', message: 'パスワードを入力してください。' });
            };

            const submitModalAuth = () => {
                if (modal.type === 'SETUP_PASS') {
                    if (!modalInput.trim()) { setAuthError('パスワードを入力してください'); return; }
                    setConfig({ ...config, password: modalInput }); setIsAuthenticated(true);
                    closeModal(); openAlert('設定完了', 'パスワードを設定しました。忘れないようにしてください。'); setView('ADMIN');
                } else if (modal.type === 'LOGIN') {
                    if (modalInput === config.password || modalInput === 'SOS9999') {
                        setIsAuthenticated(true); closeModal(); setView('ADMIN');
                        if (modalInput === 'SOS9999') setTimeout(() => { openAlert('警告', '緊急マスターパスワードで突破しました。速やかにパスワードの再設定を行ってください。'); }, 300);
                    } else setAuthError('パスワードが違います');
                }
            };
            
            const handleLock = () => { setIsAuthenticated(false); setView('HOME'); openAlert('ロック完了', '名簿管理画面をロックしました。再度アクセスするにはパスワードが必要です。'); };

            const handlePasswordSet = () => {
                if (config.password !== '' && oldPasswordInput !== config.password) { setAuthError('現在のパスワードが間違っています'); return; }
                if (newPassword === '') { setAuthError('新しいパスワードを入力してください'); return; }
                setConfig({ ...config, password: newPassword }); setNewPassword(''); setOldPasswordInput(''); setAuthError('');
                openAlert('更新完了', 'パスワードを変更しました');
            };

            const generateSeating = () => {
                try {
                    let students = roster.map(s => ({
                        ...s,
                        pairTarget: s.notes && s.notes.includes('ペア') ? extractTargetNumber(s.notes) : null,
                        avoidTarget: s.notes && s.notes.includes('離す') ? extractTargetNumber(s.notes) : null,
                        locationReq: analyzeLocationReq(s.notes)
                    }));
                    const totalSeats = config.rows * config.cols;
                    let newSeats = Array(totalSeats).fill(null);
                    let validSlots = [];
                    for(let i=0; i<totalSeats; i++) if (!fixedVoids.has(i)) validSlots.push(i);

                                <h2 className="text-base sm:text-xl font-bold flex items-center gap-1 sm:gap-2 truncate flex-shrink-0">
                                    <span className="bg-white text-blue-700 px-3 py-1 rounded shadow-sm font-black">座席表メーカーPro</span>
                                    <span>名簿・設定管理</span>
                                </h2>
                                <div className="flex gap-1 sm:gap-2">
                                    <button onClick={handleLock} className="bg-blue-800 border border-blue-600 text-white px-3 sm:px-4 h-9 sm:h-10 rounded text-xs sm:text-sm font-bold hover:bg-blue-900 shadow transition flex items-center justify-center gap-1 flex-shrink-0"><LucideIcon name="lock" size={16}/> <span className="hidden sm:inline">ロック</span></button>
                                    <button onClick={() => setView('HOME')} className="bg-white text-blue-700 px-3 sm:px-4 h-9 sm:h-10 rounded text-xs sm:text-sm font-bold hover:bg-gray-100 shadow transition flex items-center justify-center flex-shrink-0">座席表に戻る</button>
                                </div>
                            </div>
                        </div>
                        <div className="max-w-5xl mx-auto p-2 sm:p-4 space-y-4">
                            
                            <section className="bg-white shadow rounded-lg p-4">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="font-bold text-gray-700 flex items-center gap-2 text-sm"><LucideIcon name="user-plus" size={16}/> 児童一括登録・編集エディタ</h3>
                                    <label className="cursor-pointer bg-green-600 text-white px-3 py-1 rounded text-xs hover:bg-green-700 flex items-center gap-1"><LucideIcon name="file-spreadsheet" size={14}/> CSV読込<input type="file" accept=".csv,.txt" className="hidden" onChange={(e) => { const file = e.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = (ev) => { const currentText = localCsv.trim() ? localCsv + '\n' : ''; const newText = currentText + ev.target.result; setLocalCsv(newText); handleCsvApply(newText); openAlert('読込完了', 'CSVファイルを読み込み、リストに反映しました。'); }; reader.readAsText(file); e.target.value=''; }} /></label>
                                </div>
                                <textarea className="w-full h-32 border rounded p-3 font-mono text-xs bg-white focus:ring-2 focus:ring-blue-500 outline-none leading-relaxed whitespace-pre" placeholder={`出席番号,氏名,ふりがな,男`} value={localCsv} onChange={(e) => setLocalCsv(e.target.value)} onBlur={(e) => handleCsvApply(e.target.value)} />
                                <p className="text-[10px] text-gray-500 mt-1">※フォーカスを外すと下部のリストに反映されます。性別は「男」「女」で入力してください。</p>
                            </section>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <section className="bg-white shadow rounded-lg p-4 h-full">
                                    <h3 className="font-bold text-gray-700 mb-3 flex items-center gap-2 text-sm">クラス・座席設定</h3>
                                    <div className="flex flex-wrap items-end gap-2">
                                        <div className="flex-grow min-w-[120px]"><label className="block text-[10px] text-gray-500">学級名</label><input type="text" value={config.className} onChange={(e) => setConfig({...config, className: e.target.value})} className="w-full border rounded p-1.5 text-sm"/></div>
                                        <div className="w-12"><label className="block text-[10px] text-gray-500">列</label><input type="number" min="1" max="10" value={config.cols} onChange={(e) => setConfig({...config, cols: parseInt(e.target.value) || 6})} className="w-full border rounded p-1.5 text-sm text-center"/></div>
                                        <div className="w-12"><label className="block text-[10px] text-gray-500">行</label><input type="number" min="1" max="10" value={config.rows} onChange={(e) => setConfig({...config, rows: parseInt(e.target.value) || 6})} className="w-full border rounded p-1.5 text-sm text-center"/></div>
                                        <button onClick={() => { if (roster.length === 0) { openAlert("注意", "先に児童名を登録してください"); return; } setView('VOID_CONFIG'); }} className="bg-orange-100 text-orange-700 border border-orange-200 px-3 py-1.5 rounded text-xs font-bold hover:bg-orange-200 flex items-center gap-1 h-[34px]">
                                            <LucideIcon name="armchair" size={14} /> 空席指定
                                        </button>
                                    </div>
                                </section>

                                <section className="bg-white shadow rounded-lg p-4 h-full">
                                    <div className="flex flex-wrap md:flex-nowrap gap-4">
                                        <div className="flex-shrink-0 w-full md:w-auto">
                                            <h3 className="font-bold text-gray-700 mb-2 text-[10px] uppercase tracking-wider">管理/復元</h3>
                                            <div className="flex gap-2">
                                                <button onClick={handleBackupData} className="bg-green-50 text-green-700 border border-green-200 px-2 py-1.5 rounded text-[10px] font-bold hover:bg-green-100 flex items-center gap-1 h-[34px] flex-grow md:flex-grow-0"><LucideIcon name="save" size={14} /> 保存</button>
                                                <label className="cursor-pointer bg-blue-50 text-blue-700 border border-blue-200 px-2 py-1.5 rounded text-[10px] font-bold hover:bg-blue-100 flex items-center gap-1 h-[34px] flex-grow md:flex-grow-0"><LucideIcon name="upload" size={14} /> 復元<input type="file" accept=".json" className="hidden" onChange={handleRestoreData} /></label>
                                            </div>
                                        </div>
                                        <div className="flex-grow border-l-0 md:border-l pl-0 md:pl-4 w-full md:w-auto">
                                            <h3 className="font-bold text-gray-700 mb-2 text-[10px] uppercase tracking-wider">パスワード変更</h3>
                                            <div className="flex gap-1 items-center">
                                                <input type="password" placeholder="現在のパスワード" value={oldPasswordInput} onChange={(e)=>setOldPasswordInput(e.target.value)} className="border rounded p-1.5 text-[10px] w-20 flex-grow"/>
                                                <input type="password" placeholder="新規パスワード" value={newPassword} onChange={(e)=>setNewPassword(e.target.value)} className="border rounded p-1.5 text-[10px] w-20 flex-grow"/>
                                                <button onClick={handlePasswordSet} className="bg-gray-700 text-white px-2 py-1.5 rounded text-[10px] hover:bg-gray-800 font-bold h-[34px]">更新</button>
                                            </div>
                                        </div>
                                    </div>
                                </section>
                            </div>

                            <section className="bg-white shadow rounded-lg p-4">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-gray-700 text-sm">登録済み児童リスト ({roster.length}名)</h3>
                                    <div className="flex gap-2">
                                        <button onClick={() => setModal({isOpen: true, type: 'HELP'})} className="flex items-center gap-1 bg-blue-100 text-blue-700 px-3 py-1 rounded text-xs font-bold hover:bg-blue-200"><LucideIcon name="help-circle" size={14}/> ルール解説</button>
                                        <button onClick={() => openConfirm('全削除', '本当に全員削除しますか？', () => setRoster([]))} className="text-red-500 text-xs hover:underline">全削除</button>
                                    </div>
                                </div>
                                <div className="overflow-x-auto max-h-96 border rounded">
                                    <table className="w-full border-collapse text-xs">
                                        <thead className="sticky top-0 bg-gray-50 z-10"><tr className="text-left"><th className="p-2 border">No.</th><th className="p-2 border">氏名</th><th className="p-2 border">性別</th><th className="p-2 border text-center">リーダー</th><th className="p-2 border text-center">視力</th><th className="p-2 border text-center">エリア</th><th className="p-2 border">配慮事項</th><th className="p-2 border">操作</th></tr></thead>
                                        <tbody>{roster.map((s, i) => (<tr key={s.id} className="border-b hover:bg-gray-50"><td className="p-2 border w-12"><input value={s.number} onChange={e=>{const n=[...roster];n[i].number=e.target.value;setRoster(n)}} className="w-full bg-transparent"/></td><td className="p-2 border"><input value={s.name} onChange={e=>{const n=[...roster];n[i].name=e.target.value;setRoster(n)}} className="w-full bg-transparent"/></td><td className="p-2 border w-12"><select value={s.gender} onChange={e=>{const n=[...roster];n[i].gender=e.target.value;setRoster(n)}} className="w-full bg-transparent"><option value="M">男</option><option value="F">女</option></select></td><td className="p-2 border text-center"><input type="checkbox" checked={s.leader} onChange={e=>{const n=[...roster];n[i].leader=e.target.checked;setRoster(n)}} className="w-5 h-5 cursor-pointer accent-blue-600"/></td><td className="p-2 border text-center"><input type="checkbox" checked={s.vision} onChange={e=>{const n=[...roster];n[i].vision=e.target.checked;setRoster(n)}} className="w-5 h-5 cursor-pointer accent-blue-600"/></td><td className="p-2 border text-center"><button onClick={() => { setModal({ isOpen: true, type: 'PAINT', title: '配置エリア指定', studentId: s.id, onConfirm: (cells) => { const n = [...roster]; n[i].allowedCells = cells; setRoster(n); } }); }} className={`px-2 py-1 rounded text-[10px] font-bold transition-colors whitespace-nowrap ${s.allowedCells && s.allowedCells.length > 0 ? 'bg-green-100 text-green-700 hover:bg-green-200 border border-green-300' : 'bg-gray-100 text-gray-600 hover:bg-gray-200 border border-gray-300'}`}>{s.allowedCells && s.allowedCells.length > 0 ? `${s.allowedCells.length}席` : '全域'}</button></td><td className="p-2 border"><input value={s.notes} onChange={e=>{const n=[...roster];n[i].notes=e.target.value;setRoster(n)}} className="w-full bg-transparent" placeholder="例:3番と離す"/></td><td className="p-2 border text-center"><button onClick={()=>{const n=roster.filter((_,idx)=>idx!==i);setRoster(n)}} className="text-red-500 font-bold">✕</button></td></tr>))}</tbody>
                                    </table>
                                </div>
                            </section>
                        </div>
                        <Modal modal={modal} closeModal={closeModal} modalInput={modalInput} setModalInput={setModalInput} submitModalAuth={submitModalAuth} authError={authError} roster={roster} config={config} fixedVoids={fixedVoids} />
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-100 flex flex-col items-center pb-4 print:bg-white print:p-0">
                    <div className="hidden print:block text-center mb-4 pt-4 w-full"><h1 className="text-3xl font-bold border-b-2 border-black inline-block px-8 pb-2">{config.className} 座席表</h1></div>
                    
                    <div className="sticky top-0 z-40 w-full bg-blue-700 text-white shadow-md mb-4 sm:mb-6 print:hidden">
                        <div className="w-full max-w-6xl mx-auto px-2 sm:px-4 py-2 sm:py-3 flex justify-between items-center gap-1 sm:gap-2">
                            <div className="flex items-center gap-1 sm:gap-2 flex-shrink-0">
                                <div className="bg-white text-blue-700 px-3 py-1 rounded text-base sm:text-xl font-black flex-shrink-0 mr-1 shadow-sm">
                                    座席表メーカーPro
                                </div>
                                <button onClick={handleAdminAccess} className="flex items-center justify-center gap-1 sm:gap-2 bg-blue-800 border border-blue-600 text-white px-2 sm:px-3 h-9 sm:h-10 rounded shadow hover:bg-blue-900 transition flex-shrink-0">
                                    <LucideIcon name="settings" size={18} /> <span className="hidden sm:inline text-sm font-bold">名簿管理</span>
                                </button>
                                <div className="flex items-center bg-blue-800 border border-blue-600 rounded px-1 sm:px-2 h-9 sm:h-10 shadow flex-shrink-0 overflow-hidden">
                                    <span className="text-[10px] sm:text-xs text-blue-100 mr-1 sm:mr-2 hidden lg:inline">視点:</span>
                                    <select value={config.perspective} onChange={(e) => setConfig({...config, perspective: e.target.value})} className="text-[10px] sm:text-sm outline-none font-bold text-white bg-transparent cursor-pointer">
                                        <option value="STUDENT" className="text-gray-800">児童側(教卓上)</option>
                                        <option value="TEACHER" className="text-gray-800">先生側(教卓下)</option>
                                    </select>
                                </div>
                            </div>
                            <div className="flex items-center gap-1 sm:gap-2 flex-shrink-0">
                                <button onClick={handleCopyText} className="flex items-center justify-center gap-1 sm:gap-2 bg-green-600 text-white w-9 sm:w-auto h-9 sm:h-10 px-0 sm:px-4 rounded shadow hover:bg-green-700 transition flex-shrink-0" title="コピー"><LucideIcon name="copy" size={18} /> <span className="hidden sm:inline text-sm font-bold">コピー</span></button>
                                <button onClick={handlePrintHTML} className="flex items-center justify-center gap-1 sm:gap-2 bg-purple-600 text-white w-9 sm:w-auto h-9 sm:h-10 px-0 sm:px-4 rounded shadow hover:bg-purple-700 transition flex-shrink-0" title="印刷・出力"><LucideIcon name="printer" size={18} /> <span className="hidden sm:inline text-sm font-bold">印刷・出力</span></button>
                                <button onClick={() => setModal({isOpen: true, type: 'PRINT_HELP'})} className="flex items-center justify-center gap-1 sm:gap-2 bg-gray-500 text-white w-9 sm:w-auto h-9 sm:h-10 px-0 sm:px-3 rounded shadow hover:bg-gray-600 transition flex-shrink-0" title="印刷ヘルプ"><LucideIcon name="help-circle" size={18} /> <span className="hidden sm:inline text-sm font-bold">印刷ヘルプ</span></button>
                            </div>
                        </div>
                    </div>

                    <div className="relative bg-white shadow-lg p-6 rounded-lg max-w-6xl w-full mx-4 print:shadow-none print:w-full print:max-w-none print:p-0">
                        {config.perspective === 'STUDENT' && <div className="w-full flex justify-center items-center relative mb-6 print:mb-8"><div className="absolute left-0 font-bold text-xl text-black print:hidden">{config.className}</div><div className="border-2 border-black bg-gray-100 px-10 py-2 rounded font-bold text-lg">教 卓</div></div>}
                        {tempMessage && <div className="absolute inset-0 z-10 flex items-center justify-center bg-white bg-opacity-80 rounded-lg"><div className="bg-blue-600 text-white text-2xl font-bold px-8 py-4 rounded-full shadow-lg animate-pulse">{tempMessage}</div></div>}
                        <div className="grid gap-2 mx-auto" style={{ gridTemplateColumns: `repeat(${config.cols}, minmax(0, 1fr))` }}>
                            {displaySeats.map((seat, index) => {
                                let realIndex = index; if (config.perspective === 'TEACHER') { const r = Math.floor(index / config.cols), c = index % config.cols; const realR = config.rows - 1 - r, realC = config.cols - 1 - c; realIndex = realR * config.cols + realC; }
                                const student = seat.student; let style = STYLES.default; if (student) style = student.gender === 'M' ? STYLES.boy : STYLES.girl;
                                if (fixedVoids.has(realIndex)) return <div key={seat.id} className="flex items-center justify-center p-1 m-0.5 border-2 rounded border-gray-200 bg-gray-100 h-16 w-full text-gray-300 text-xs">✕</div>;
                                const isBeingTouched = dragSourceIndex === realIndex && isTouchDragging;
                                return <div key={seat.id} draggable={!isShuffling && student !== null} onDragStart={(e) => handleDragStart(e, realIndex)} onDragOver={(e) => handleDragOver(e, realIndex)} onDrop={(e) => handleDrop(e, realIndex)} onTouchStart={(e) => handleTouchStart(e, realIndex)} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd} data-real-index={realIndex} className={`flex items-center justify-center p-1 m-0.5 border-2 rounded shadow-sm ${style.border} ${style.bg} ${style.text} h-16 w-full overflow-hidden cursor-move hover:brightness-95 transition-all ${isBeingTouched ? 'touch-dragging' : ''}`}><div className="text-center w-full pointer-events-none">{student ? <><div className="text-[10px] text-gray-400 mb-0.5 leading-none">{student.number}</div><div className="font-bold text-sm sm:text-base leading-tight truncate px-1" title={student.name}>{student.name}</div></> : <span className="text-gray-300 text-xs font-bold">空席</span>}</div></div>;
                            })}
                        </div>
                        {config.perspective === 'TEACHER' && <div className="w-full flex justify-center items-center relative mt-6 print:mt-8"><div className="absolute left-0 font-bold text-xl text-black print:hidden">{config.className}</div><div className="border-2 border-black bg-gray-100 px-10 py-2 rounded font-bold text-lg">教 卓</div></div>}
                        <div className="text-center mt-8 text-[10px] text-gray-400 tracking-wider no-print">©2026 座席表メーカーPro ＩＣＴ支援の杜</div>
                    </div>
                    <div className="fixed bottom-0 w-full bg-white border-t p-2 sm:p-4 flex flex-col sm:flex-row justify-center items-center gap-2 sm:gap-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] print:hidden z-20">
                        <div className="flex items-center bg-gray-100 rounded-full px-3 sm:px-4 py-1.5 sm:py-2 shadow-inner border border-gray-200"><span className="text-xs sm:text-sm text-gray-600 font-bold mr-2 hidden md:inline">男女配置:</span><select value={config.seatingPattern || 'CHECKERED'} onChange={(e) => setConfig({...config, seatingPattern: e.target.value})} className="text-xs sm:text-sm outline-none font-bold text-gray-800 bg-transparent cursor-pointer" disabled={isShuffling}><option value="CHECKERED">市松模様 (男女交互)</option><option value="COLUMN">列ごとに男女分離</option></select></div>
                        {!isShuffling ? <button onClick={startShuffle} className="flex items-center justify-center gap-2 bg-blue-600 text-white px-6 sm:px-8 py-2 sm:py-3 rounded-full font-bold text-base sm:text-lg shadow hover:bg-blue-700 transition transform hover:scale-105 active:scale-95"><LucideIcon name="shuffle" size={20} className="sm:w-6 sm:h-6" /> 席替え開始</button> : <button onClick={stopShuffle} className="flex items-center justify-center gap-2 bg-red-600 text-white px-6 sm:px-8 py-2 sm:py-3 rounded-full font-bold text-base sm:text-lg shadow hover:bg-red-700 transition transform hover:scale-105 active:scale-95"><LucideIcon name="stop-circle" size={20} className="sm:w-6 sm:h-6" /> ストップ</button>}
                    </div>
                    <div className="h-32 print:hidden"></div>
                    <Modal modal={modal} closeModal={closeModal} modalInput={modalInput} setModalInput={setModalInput} submitModalAuth={submitModalAuth} authError={authError} roster={roster} config={config} fixedVoids={fixedVoids} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
